name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Regenerate Gradle Wrapper
      run: gradle wrapper

    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Decode Keystore
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
        fi

    - name: Build Debug and Release Apks
      run: ./gradlew assembleDebug assembleRelease bundleRelease
      env:
        KEYSTORE_PATH: ${{ secrets.KEYSTORE_BASE64 != '' && 'release.keystore' || '' }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apk-debug
        path: app/build/outputs/apk/debug/
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apk-release
        path: app/build/outputs/apk/release/
    
    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: aab-release
        path: app/build/outputs/bundle/release/ 
